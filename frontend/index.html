<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞热帖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div class="brand-mark" aria-hidden="true">🔥</div>
            <div class="brand-copy">
                <div class="eyebrow">PKU TREEHOLE</div>
                <h1>此刻热帖</h1>
                <p>发现正在被讨论的校园话题</p>
            </div>
            <div class="connection" id="connection">
                <span class="connection-dot"></span>
                <span id="connection-text">连接中</span>
            </div>
        </header>

        <nav class="window-tabs" aria-label="时间窗口">
            <button data-window="1h">1 小时</button>
            <button data-window="0.5d">半天</button>
            <button data-window="1d" class="active">1 天</button>
            <button data-window="3d">3 天</button>
            <button data-window="7d">1 周</button>
        </nav>

        <section id="notice" class="notice" hidden></section>

        <div id="status" class="status loading" role="status">
            <span class="spinner" aria-hidden="true"></span>
            <span id="status-text">正在获取热帖…</span>
        </div>

        <ol id="post-list" class="post-list" aria-live="polite"></ol>
        <button id="load-more" class="load-more" type="button" hidden></button>

        <footer>
            <span id="generated-at">等待首次更新</span>
            <button id="refresh" class="refresh-button" type="button" aria-label="刷新榜单">↻ 刷新</button>
        </footer>
        <div id="toast" class="toast" role="status" hidden>已复制洞号</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
