<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sidebar visual fixture</title>
    <style>
        body { margin:0; min-height:100vh; background:#f4f5f7; color:#333; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        header { padding:22px 8%; background:#fff; border-bottom:1px solid #e7e7e7; color:#9b1b30; font-size:20px; font-weight:700; }
        main { width:min(760px,84%); margin:30px auto; }
        article { margin-bottom:14px; padding:22px; border-radius:12px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.05); }
    </style>
</head>
<body>
    <header>PKU 树洞 · 侧边栏视觉测试</header>
    <main>
        <article>这是一条用于检查插件样式隔离的模拟树洞内容。</article>
        <article>页面自身的 header、button 等样式不应影响插件面板。</article>
    </main>
    <script src="../extension/sidebar.js"></script>
</body>
</html>
